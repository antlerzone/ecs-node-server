# Paste these blocks inside the server { } for portal.colivingjb.com,
# BEFORE any "location /api/" that forwards to Node. Otherwise requests like
# POST /api/portal/proxy/billing/indoor-admin/api-docs-users will hit Node
# and return 404 (Node has no /api/portal/proxy/... routes).
#
# Order: /api/portal/proxy/ and /api/available-unit/ first, then /api/ .

    # Portal API proxy – must hit Next.js so it can forward to ECS /api/billing/...
    location /api/portal/proxy/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/available-unit/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Other /api/ can go to Node if needed (e.g. portal-auth when not using proxy)
    # location /api/ { ... }
