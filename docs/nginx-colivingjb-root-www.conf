# Install on ECS as /etc/nginx/conf.d/colivingjb-root-www.conf
# Replaces old "301 → portal.../homedemo" so www + apex hit the same Next app as portal (3001).
#
# After editing: sudo nginx -t && sudo systemctl reload nginx
#
# ACME http-01: /.well-known on :80 must stay before HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name colivingjb.com www.colivingjb.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name colivingjb.com www.colivingjb.com;

    ssl_certificate     /etc/letsencrypt/live/www.colivingjb.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.colivingjb.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
