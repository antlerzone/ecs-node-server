<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bulk Expenses Upload</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

<style>
html, body {
  background: transparent !important;
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: "Inter", sans-serif;
}

#uploadArea {
  box-sizing: border-box;
  width: 100%;
  height: 100%;
  display: flex;              /* ✅ */
  align-items: center;        /* 垂直居中 */
  justify-content: center;    /* 水平居中 */
  text-align: center;         /* 文字居中 */
  background: #fff;
  color: #000;
  border: 1px dashed #ddd;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
}



#uploadArea:hover,
#uploadArea.dragover {
  background: #4CAF50;
  color: #fff;
  border-color: #4CAF50;
}

#progressArea {
  width: 100%;
  height: 3px;
  background: #eee;
  display: block;
}



  #progressBar {
    height: 100%;
    width: 0%;
    background: #4CAF50;
    transition: width 0.3s;
  }

  @media (max-width: 480px) {
    #uploadArea {
      width: 260px;
      height: 40px;
      font-size: 14px;
    }
  }
</style>
</head>
<body>

<div id="uploadArea">📤 Click or Drag to Upload Excel File</div>
<input id="fileInput" type="file" accept=".xlsx" multiple style="display:none;" />


<div id="progressArea"><div id="progressBar"></div></div>

<script>
const uploadArea = document.getElementById("uploadArea");
const fileInput = document.getElementById("fileInput");
const progressArea = document.getElementById("progressArea");
const progressBar = document.getElementById("progressBar");

uploadArea.addEventListener("click", () => fileInput.click());

uploadArea.addEventListener("dragover", (e) => {
  e.preventDefault();
  uploadArea.classList.add("dragover");
});

uploadArea.addEventListener("dragleave", () => {
  uploadArea.classList.remove("dragover");
});

uploadArea.addEventListener("drop", (e) => {
  e.preventDefault();
  uploadArea.classList.remove("dragover");
const files = Array.from(e.dataTransfer.files);
files.forEach(file => handleFile(file));

});

fileInput.addEventListener("change", (e) => {

  const files = Array.from(e.target.files);

  files.forEach(file => {
    handleFile(file);
  });

  // 🔥 关键：清空 input，允许再次上传同一个文件
  fileInput.value = "";
});


async function handleFile(file) {
  if (!file) return;

  progressArea.style.visibility = "visible";
  progressBar.style.width = "30%";

  const reader = new FileReader();

  reader.onload = async (e) => {
    try {
      const buffer = e.target.result;
      const workbook = new ExcelJS.Workbook();
      await workbook.xlsx.load(buffer);

      const sheet = workbook.getWorksheet("Expenses");
      if (!sheet) return;

      const rows = [];
      let total = 0;

      sheet.eachRow((row, rowNumber) => {
        if (rowNumber === 1) return;

        const property = row.getCell(1).value || "";
        const supplier = row.getCell(2).value || "";
        const description = row.getCell(3).value || "";
        const amount = Number(row.getCell(4).value || 0);
        const period = row.getCell(5).value || null;

        if (!description && !amount) return;

        total += amount;

        rows.push({
          property,
          supplier,
          description,
          amount,
          period
        });
      });

      progressBar.style.width = "100%";

      window.parent.postMessage(
        {
          type: "BULK_PREVIEW",
          rows,
          total
        },
        "*"
      );

      setTimeout(() => {
        progressArea.style.visibility = "hidden";
        progressBar.style.width = "0%";
      }, 800);

    } catch (err) {
      console.error("Excel parse error:", err);
    }
  };

  reader.readAsArrayBuffer(file);
}
</script>

</body>
</html>
