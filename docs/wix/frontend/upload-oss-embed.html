<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload</title>
    <style>
        html, body {
            background: transparent !important;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Inter", sans-serif;
        }

        #uploadArea {
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #fff;
            color: #000;
            border: 1px dashed #ddd;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        #uploadArea:hover,
        #uploadArea.dragover {
            background: #4CAF50;
            color: #fff;
            border-color: #4CAF50;
        }

        #progressArea {
            width: 100%;
            height: 3px;
            background: #eee;
            display: none;
        }

        #progressBar {
            height: 100%;
            width: 0%;
            background: #4CAF50;
            transition: width 0.3s;
        }

        #fileInput {
            display: none;
        }

        @media (max-width: 480px) {
            #uploadArea {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="uploadArea">📤 Click or drag to upload</div>
    <input id="fileInput" type="file" accept="image/*,video/*" />
    <div id="progressArea"><div id="progressBar"></div></div>
    <script>
(function() {
    var baseUrl, token, username, clientId, uploadId, uploadPath, makeBackgroundWhite, parentOrigin, parentSource;
    var uploadArea = document.getElementById("uploadArea");
    var fileInput = document.getElementById("fileInput");
    var progressArea = document.getElementById("progressArea");
    var progressBar = document.getElementById("progressBar");

    function sendToParent(data) {
        if (parentSource && parentOrigin) {
            parentSource.postMessage(data, parentOrigin);
        }
    }

    function setProgress(percent) {
        progressBar.style.width = (percent || 0) + "%";
        progressArea.style.display = percent > 0 && percent < 100 ? "block" : "none";
    }

    window.addEventListener("message", function(event) {
        var data = event.data;
        if (!data) return;
        if (data.type === "SET_LABEL") {
            uploadArea.textContent = data.label != null ? data.label : uploadArea.textContent;
            return;
        }
        if (data.type !== "INIT") return;
        baseUrl = (data.baseUrl || "").replace(/\/$/, "");
        token = data.token || "";
        username = data.username || "";
        clientId = data.clientId || "";
        uploadId = data.uploadId || "upload";
        uploadPath = (data.uploadPath || "/api/upload").replace(/^\//, "");
        makeBackgroundWhite = data.makeBackgroundWhite === true || data.makeBackgroundWhite === "true";
        parentOrigin = event.origin;
        parentSource = event.source;

        uploadArea.textContent = data.label != null ? data.label : "📤 Click or drag to upload";
        fileInput.accept = data.accept || "image/*,video/*";
        fileInput.value = "";
        setProgress(0);
    });

    uploadArea.addEventListener("click", function() {
        fileInput.click();
    });

    uploadArea.addEventListener("dragover", function(e) {
        e.preventDefault();
        uploadArea.classList.add("dragover");
    });

    uploadArea.addEventListener("dragleave", function() {
        uploadArea.classList.remove("dragover");
    });

    uploadArea.addEventListener("drop", function(e) {
        e.preventDefault();
        uploadArea.classList.remove("dragover");
        var files = e.dataTransfer && e.dataTransfer.files;
        if (files && files.length) handleFile(files[0]);
    });

    fileInput.addEventListener("change", function() {
        var file = fileInput.files && fileInput.files[0];
        if (file) handleFile(file);
        fileInput.value = "";
    });

    function handleFile(file) {
        if (!file) return;
        if (!baseUrl || !token || !username || !clientId) {
            sendToParent({ type: "UPLOAD_ERROR", uploadId: uploadId, reason: "Not configured" });
            return;
        }

        setProgress(30);
        var formData = new FormData();
        formData.append("file", file);
        formData.append("clientId", clientId);
        if (makeBackgroundWhite) formData.append("makeBackgroundWhite", "true");

        var path = (uploadPath.indexOf("/") === 0 ? "" : "/") + uploadPath;
        fetch(baseUrl + path, {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + token,
                "X-API-Username": username
            },
            body: formData
        })
        .then(function(res) { return res.json(); })
        .then(function(json) {
            setProgress(100);
            if (json && json.ok && json.url) {
                var mediaType = (file.type && file.type.indexOf("video") !== -1) ? "video" : "image";
                sendToParent({ type: "UPLOAD_SUCCESS", uploadId: uploadId, url: json.url, mediaType: mediaType });
            } else {
                var reason = (json && json.reason) ? json.reason : "Upload failed";
                sendToParent({ type: "UPLOAD_ERROR", uploadId: uploadId, reason: reason });
            }
            setTimeout(function() { setProgress(0); }, 500);
        })
        .catch(function(err) {
            setProgress(0);
            var msg = err && err.message ? err.message : "Upload failed";
            sendToParent({ type: "UPLOAD_ERROR", uploadId: uploadId, reason: msg });
        });
    }
})();
    </script>
</body>
</html>
